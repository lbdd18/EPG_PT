name: Update EPG

on:
  schedule:
    - cron: "0 5 * * *"  # todos os dias as 05:00 UTC (~06:00-07:00 em Lisboa)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Gerar guide.xml
        run: python3 update_epg.py

      - name: Publicar alteracoes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add guide.xml
          git diff --cached --quiet || git commit -m "Atualiza guia EPG"
          git push
